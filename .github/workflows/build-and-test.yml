name: Build and Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    strategy:
      matrix:
        os: [ubuntu-20.04, ubuntu-22.04, ubuntu-24.04, ubuntu-24.10]
      fail-fast: false

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cache apt packages
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: build-essential pkg-config cmake libhdf5-dev liblz4-dev git wget unzip python3 ca-certificates

      - name: Cache LASlib build
        uses: actions/cache@v3
        with:
          path: lib
          key: ${{ runner.os }}-lib-${{ hashFiles('scripts/install_laslib.sh') }}
          restore-keys: |
            ${{ runner.os }}-lib-

      - name: Create lib directory
        run: mkdir -p lib

      - name: Build LASlib
        run: chmod +x scripts/install_laslib.sh && ./scripts/install_laslib.sh

      - name: Cache CMake build
        uses: actions/cache@v3
        with:
          path: build
          key: ${{ runner.os }}-cmake-${{ hashFiles('CMakeLists.txt', 'cmake/**') }}
          restore-keys: |
            ${{ runner.os }}-cmake-

      - name: Configure CMake
        run: |
          mkdir -p build
          cd build
          cmake .. -DBUILD_TESTS=ON -DCMAKE_BUILD_TYPE=Release

      - name: Build project
        run: |
          cd build
          cmake --build . --config Release

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure -V
